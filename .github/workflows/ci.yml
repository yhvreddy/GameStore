name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore GameStore/GameStore.csproj

      - name: Build
        run: dotnet build GameStore/GameStore.csproj --configuration Release --no-restore

      - name: Build Docker image
        run: docker build -t gamestore-api:ci .
